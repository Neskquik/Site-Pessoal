<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <title>Nesk</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://i.pinimg.com/736x/84/63/31/846331641bc407e8822610b1456e1e24.jpg" type="image/jpg">
</head>

<body>

    <video autoplay muted loop class="fundo">
        <source src="fundo/video.mp4" type="video/mp4">
    </video>
    
    <div>
        <img src="https://i.pinimg.com/736x/84/63/31/846331641bc407e8822610b1456e1e24.jpg" class="perfil">
        <h1 class="nome">Nesk Developer</h1>
    </div>

    <div class="container">
        <a href="https://tracker.gg/valorant/profile/riot/NeskadasPaty%23Ocean/overview?platform=pc&playlist=competitive&season=ce2783e8-44fc-dd48-3da3-33b5ba6c4a22" target="_blank">
            <img src="icons/valorant.jpg" alt="valorant" class="valorant"> 
        </a>

        <a href="https://github.com/Neskquik" target="_blank">
            <img src="icons/github.png" alt="github" class="github">
        </a>

        <a href="https://open.spotify.com/user/21eh2fl4d3fgcoaycvqej5tti?si=c74eff60acc84e0e" target="_blank">
            <img src="icons/spotify.png" alt="spofityicon" class="spotifyicon">
        </a>
    </div>


    <div class="player-bloco">

        <div class="player-menu">
            <img src="icons/spotifymusic.gif" class="player-cover" alt="capa">

            <div class="player-text">
                <span class="player-title">The Neighbourhood - Reflections</span>

                <div class="player-time-row">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>

                <div class="player-bar" id="player-bar">
                    <div class="player-bar-fill" id="player-bar-fill"></div>
                </div>
            </div>
        </div>   
        
        <div class="player-controls">
            <button id="play-pause" class="player-btn">▶</button>
        </div>

        <audio id="audio" src="musica/musica.mp3" muted></audio>

    </div>

  
    <div class="MarcaD">
        © Todos os direitos reservados para o criador do site. Nesk Developer.
    </div>

<script>
  const audio = document.getElementById('audio');
  const playPauseBtn = document.getElementById('play-pause');
  const currentTimeEl = document.getElementById('current-time');
  const totalTimeEl = document.getElementById('total-time');
  const bar = document.getElementById('player-bar');
  const barFill = document.getElementById('player-bar-fill');

  function formatTime(t) {
    if (isNaN(t)) return "0:00";
    const m = Math.floor(t / 60);
    let s = Math.floor(t % 60);
    if (s < 10) s = "0" + s;
    return `${m}:${s}`;
  }

  audio.addEventListener('loadedmetadata', () => {
    totalTimeEl.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    currentTimeEl.textContent = formatTime(audio.currentTime);
    const percent = (audio.currentTime / audio.duration) * 100;
    barFill.style.width = `${percent}%`;
  });

  playPauseBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      playPauseBtn.textContent = '❚❚'; // pause
    } else {
      audio.pause();
      playPauseBtn.textContent = '▶'; // play
    }
  });

  bar.addEventListener('click', (e) => {
    const rect = bar.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const percent = clickX / rect.width;
    audio.currentTime = percent * audio.duration;
  });

  window.addEventListener("load", () => {
    audio.muted = true;
    audio.play().catch((err) => {
      console.log("Autoplay bloqueado (normal):", err);
    });
  });

  let desbloqueado = false;
  function desbloquearAudio() {
    if (desbloqueado) return;
    desbloqueado = true;
    audio.muted = false;
    if (audio.paused) {
      audio.play().catch(err => console.log("Erro ao tocar após interação:", err));
    }
  }

  document.addEventListener("click", desbloquearAudio, { once: true });

</script>


</body>
</html>
